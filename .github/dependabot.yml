version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "03:05"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "elfpkck"
    assignees:
      - "elfpkck"
    labels:
      - "ci"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "03:10"
      timezone: "UTC"
    reviewers:
      - "elfpkck"
    assignees:
      - "elfpkck"
    labels:
      - "ci"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "03:15"
      timezone: "UTC"
    reviewers:
      - "elfpkck"
    assignees:
      - "elfpkck"
    labels:
      - "dependencies"
    allow:
      - dependency-type: "direct"  # only update explicitly defined dependencies
